<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Todo - ログイン</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ========================================
   Design Tokens
   ======================================== */
:root {
  --color-primary-50:  #EEF4F5;
  --color-primary-100: #D5E3E6;
  --color-primary-200: #A8C7CD;
  --color-primary:     #4A8D9C;
  --color-primary-600: #3E7784;
  --color-primary-700: #33616C;
  --color-primary-800: #284B54;

  --color-accent:      #C4A265;
  --color-accent-light: #FAF3E6;

  --color-error:       #B85C5C;
  --color-error-bg:    #FAF0F0;
  --color-success:     #5A8A6A;
  --color-success-bg:  #F0F7F2;

  --color-bg:          #FAFAFA;
  --color-bg-white:    #FFFFFF;
  --color-bg-subtle:   #F3F4F6;

  --color-text:        #1A1A1A;
  --color-text-secondary: #6B7280;
  --color-text-tertiary:  #9CA3AF;
  --color-text-on-primary: #FFFFFF;

  --color-border:      #E5E7EB;
  --color-border-focus: #4A8D9C;

  --font-family-base: "Inter", "Noto Sans JP", -apple-system, BlinkMacSystemFont, sans-serif;
  --font-size-xs:   0.75rem;
  --font-size-sm:   0.875rem;
  --font-size-base: 1rem;
  --font-size-lg:   1.125rem;
  --font-size-xl:   1.25rem;
  --font-size-2xl:  1.5rem;

  --shadow-sm:  0 1px 2px rgba(0,0,0,0.06);
  --shadow-md:  0 2px 8px rgba(0,0,0,0.08);
  --shadow-lg:  0 4px 16px rgba(0,0,0,0.10);

  --radius-sm:   4px;
  --radius-md:   8px;
  --radius-lg:   12px;
  --radius-full: 9999px;

  --transition-fast:   120ms ease-out;
  --transition-normal: 200ms ease-out;
}

/* ========================================
   Reset & Base
   ======================================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  font-size: 16px;
  -webkit-text-size-adjust: 100%;
}

body {
  font-family: var(--font-family-base);
  color: var(--color-text);
  background: var(--color-bg);
  line-height: 1.5;
  min-height: 100dvh;
}

/* ========================================
   Login Page
   ======================================== */
.login-page {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100dvh;
  padding: 16px;
}

.login-card {
  width: 100%;
  max-width: 400px;
  background: var(--color-bg-white);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
  padding: 40px 32px;
}

.login-header {
  text-align: center;
  margin-bottom: 40px;
}

.login-logo {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 56px;
  height: 56px;
  background: var(--color-primary);
  border-radius: var(--radius-md);
  margin-bottom: 16px;
}

.login-logo svg {
  width: 28px;
  height: 28px;
  color: var(--color-text-on-primary);
}

.login-title {
  font-size: var(--font-size-2xl);
  font-weight: 700;
  color: var(--color-text);
  line-height: 1.2;
}

.login-subtitle {
  font-size: var(--font-size-sm);
  color: var(--color-text-secondary);
  margin-top: 4px;
}

/* ========================================
   Form Elements
   ======================================== */
.form-group {
  margin-bottom: 20px;
}

.form-label {
  display: block;
  font-size: var(--font-size-sm);
  font-weight: 500;
  color: var(--color-text);
  margin-bottom: 6px;
}

.form-input {
  display: block;
  width: 100%;
  padding: 10px 12px;
  font-family: var(--font-family-base);
  font-size: var(--font-size-base);
  color: var(--color-text);
  background: var(--color-bg-white);
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-sm);
  outline: none;
  transition: border-color var(--transition-fast);
}

.form-input::placeholder {
  color: var(--color-text-tertiary);
}

.form-input:focus {
  border-color: var(--color-border-focus);
  box-shadow: 0 0 0 3px var(--color-primary-100);
}

.form-input.is-error {
  border-color: var(--color-error);
}

.form-input.is-error:focus {
  box-shadow: 0 0 0 3px rgba(184, 92, 92, 0.12);
}

.form-error {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-top: 6px;
  font-size: var(--font-size-xs);
  color: var(--color-error);
}

.form-error svg {
  width: 14px;
  height: 14px;
  flex-shrink: 0;
}

/* ========================================
   Buttons
   ======================================== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-family: var(--font-family-base);
  font-size: var(--font-size-sm);
  font-weight: 600;
  line-height: 1;
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: background-color var(--transition-fast), box-shadow var(--transition-fast);
  min-height: 44px;
}

.btn-primary {
  width: 100%;
  padding: 12px 24px;
  background: var(--color-primary);
  color: var(--color-text-on-primary);
}

.btn-primary:hover {
  background: var(--color-primary-600);
}

.btn-primary:active {
  background: var(--color-primary-700);
}

.btn-primary:disabled {
  background: var(--color-text-tertiary);
  cursor: not-allowed;
}

/* ========================================
   Error Banner
   ======================================== */
.error-banner {
  display: none; /* 表示時は flex に変更 */
  align-items: flex-start;
  gap: 8px;
  padding: 12px 16px;
  background: var(--color-error-bg);
  border-radius: var(--radius-sm);
  margin-bottom: 20px;
  font-size: var(--font-size-sm);
  color: var(--color-error);
}

.error-banner.is-visible {
  display: flex;
}

.error-banner svg {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  margin-top: 1px;
}

/* ========================================
   Responsive
   ======================================== */
@media (max-width: 430px) {
  .login-card {
    padding: 32px 20px;
    box-shadow: none;
    background: transparent;
  }

  .login-page {
    background: var(--color-bg-white);
  }
}
</style>
</head>
<body>

<div class="login-page">
  <div class="login-card">

    <div class="login-header">
      <div class="login-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 11 12 14 22 4"></polyline>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
        </svg>
      </div>
      <h1 class="login-title">Todo</h1>
      <p class="login-subtitle">タスク管理アプリ</p>
    </div>

    <!-- エラーバナー（認証失敗時に表示） -->
    <div class="error-banner is-visible" style="display: none;">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
      <span>メールアドレスまたはパスワードが正しくありません。</span>
    </div>

    <form>
      <div class="form-group">
        <label class="form-label" for="email">メールアドレス</label>
        <input
          class="form-input"
          type="email"
          id="email"
          name="email"
          placeholder="例: user@example.com"
          autocomplete="email"
          required
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="password">パスワード</label>
        <input
          class="form-input"
          type="password"
          id="password"
          name="password"
          placeholder=""
          autocomplete="current-password"
          required
        >
      </div>

      <button type="submit" class="btn btn-primary">
        ログイン
      </button>
    </form>

  </div>
</div>

</body>
</html>
