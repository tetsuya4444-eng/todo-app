<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Todo - 設定</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ========================================
   Design Tokens
   ======================================== */
:root {
  --color-primary-50:  #EEF4F5;
  --color-primary-100: #D5E3E6;
  --color-primary-200: #A8C7CD;
  --color-primary:     #4A8D9C;
  --color-primary-600: #3E7784;
  --color-primary-700: #33616C;

  --color-accent:      #C4A265;
  --color-accent-light: #FAF3E6;

  --color-error:       #B85C5C;
  --color-error-bg:    #FAF0F0;
  --color-success:     #5A8A6A;
  --color-success-bg:  #F0F7F2;

  --color-bg:          #FAFAFA;
  --color-bg-white:    #FFFFFF;
  --color-bg-subtle:   #F3F4F6;

  --color-text:        #1A1A1A;
  --color-text-secondary: #6B7280;
  --color-text-tertiary:  #9CA3AF;
  --color-text-on-primary: #FFFFFF;

  --color-border:      #E5E7EB;
  --color-border-focus: #4A8D9C;

  --font-family-base: "Inter", "Noto Sans JP", -apple-system, BlinkMacSystemFont, sans-serif;
  --font-size-xs:   0.75rem;
  --font-size-sm:   0.875rem;
  --font-size-base: 1rem;
  --font-size-lg:   1.125rem;
  --font-size-xl:   1.25rem;
  --font-size-2xl:  1.5rem;

  --shadow-sm:  0 1px 2px rgba(0,0,0,0.06);
  --shadow-md:  0 2px 8px rgba(0,0,0,0.08);

  --radius-sm:   4px;
  --radius-md:   8px;
  --radius-lg:   12px;
  --radius-full: 9999px;

  --transition-fast:   120ms ease-out;
  --transition-normal: 200ms ease-out;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font-family-base);
  color: var(--color-text);
  background: var(--color-bg);
  line-height: 1.5;
  min-height: 100dvh;
}

/* ========================================
   Header
   ======================================== */
.settings-header {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  padding: 0 8px;
  height: 56px;
  background: var(--color-bg-white);
  border-bottom: 1px solid var(--color-border);
}

.settings-header-title {
  font-size: var(--font-size-lg);
  font-weight: 600;
  color: var(--color-text);
}

.icon-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 44px;
  height: 44px;
  background: transparent;
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  color: var(--color-text-secondary);
  transition: background-color var(--transition-fast);
}

.icon-btn:hover { background: var(--color-bg-subtle); }
.icon-btn svg { width: 20px; height: 20px; }

/* ========================================
   Settings Page
   ======================================== */
.settings-page {
  max-width: 640px;
  margin: 0 auto;
  padding: 0 16px 40px;
}

/* ========================================
   Section
   ======================================== */
.settings-section {
  padding: 24px 0 8px;
}

.settings-section-title {
  font-size: var(--font-size-xs);
  font-weight: 600;
  color: var(--color-text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding-bottom: 12px;
}

.settings-card {
  background: var(--color-bg-white);
  border-radius: var(--radius-md);
  border: 1px solid var(--color-border);
  overflow: hidden;
}

/* ========================================
   Category List
   ======================================== */
.category-list-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  min-height: 52px;
  border-bottom: 1px solid var(--color-border);
  transition: background-color var(--transition-fast);
}

.category-list-item:last-child {
  border-bottom: none;
}

.category-list-item:hover {
  background: var(--color-bg-subtle);
}

.category-color-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  flex-shrink: 0;
}

.category-name {
  flex: 1;
  font-size: var(--font-size-base);
  color: var(--color-text);
  min-width: 0;
}

.category-count {
  font-size: var(--font-size-sm);
  color: var(--color-text-tertiary);
  flex-shrink: 0;
}

.category-actions {
  display: flex;
  align-items: center;
  gap: 0;
}

.category-action-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  background: transparent;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  color: var(--color-text-tertiary);
  transition: all var(--transition-fast);
}

.category-action-btn:hover {
  background: var(--color-bg-subtle);
  color: var(--color-text-secondary);
}

.category-action-btn.is-danger:hover {
  background: var(--color-error-bg);
  color: var(--color-error);
}

.category-action-btn svg {
  width: 16px;
  height: 16px;
}

/* Add Category */
.category-add {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-top: 1px solid var(--color-border);
}

.category-add-input {
  flex: 1;
  padding: 8px 10px;
  font-family: var(--font-family-base);
  font-size: var(--font-size-sm);
  color: var(--color-text);
  background: var(--color-bg-subtle);
  border: 1.5px solid transparent;
  border-radius: var(--radius-sm);
  outline: none;
  min-height: 40px;
  transition: all var(--transition-fast);
}

.category-add-input::placeholder {
  color: var(--color-text-tertiary);
}

.category-add-input:focus {
  background: var(--color-bg-white);
  border-color: var(--color-border-focus);
  box-shadow: 0 0 0 3px var(--color-primary-100);
}

.category-color-picker {
  display: flex;
  align-items: center;
  gap: 4px;
}

.color-option {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: border-color var(--transition-fast);
}

.color-option:hover {
  border-color: var(--color-text-tertiary);
}

.color-option.is-selected {
  border-color: var(--color-text);
  box-shadow: 0 0 0 2px var(--color-bg-white) inset;
}

.category-add-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 8px 14px;
  font-family: var(--font-family-base);
  font-size: var(--font-size-sm);
  font-weight: 600;
  color: var(--color-primary);
  background: var(--color-primary-50);
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  min-height: 40px;
  white-space: nowrap;
  transition: background-color var(--transition-fast);
}

.category-add-btn:hover {
  background: var(--color-primary-100);
}

/* ========================================
   Settings Row (Toggle / Action)
   ======================================== */
.settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  min-height: 52px;
  border-bottom: 1px solid var(--color-border);
}

.settings-row:last-child {
  border-bottom: none;
}

.settings-row-left {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.settings-row-label {
  font-size: var(--font-size-base);
  font-weight: 400;
  color: var(--color-text);
}

.settings-row-desc {
  font-size: var(--font-size-xs);
  color: var(--color-text-tertiary);
}

/* Toggle Switch */
.toggle {
  position: relative;
  width: 48px;
  height: 28px;
  flex-shrink: 0;
}

.toggle input {
  opacity: 0;
  width: 0;
  height: 0;
  position: absolute;
}

.toggle-track {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: var(--color-border);
  border-radius: 14px;
  cursor: pointer;
  transition: background-color var(--transition-normal);
}

.toggle-track::before {
  content: "";
  position: absolute;
  top: 3px;
  left: 3px;
  width: 22px;
  height: 22px;
  background: var(--color-bg-white);
  border-radius: 50%;
  box-shadow: var(--shadow-sm);
  transition: transform var(--transition-normal);
}

.toggle input:checked + .toggle-track {
  background: var(--color-primary);
}

.toggle input:checked + .toggle-track::before {
  transform: translateX(20px);
}

.toggle input:focus-visible + .toggle-track {
  box-shadow: 0 0 0 3px var(--color-primary-100);
}

/* ========================================
   Danger Zone
   ======================================== */
.settings-row.is-danger .settings-row-label {
  color: var(--color-error);
}

.btn-logout {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  font-family: var(--font-family-base);
  font-size: var(--font-size-sm);
  font-weight: 500;
  color: var(--color-error);
  background: transparent;
  border: 1.5px solid var(--color-error);
  border-radius: var(--radius-md);
  cursor: pointer;
  min-height: 40px;
  transition: all var(--transition-fast);
}

.btn-logout:hover {
  background: var(--color-error-bg);
}

.btn-logout svg {
  width: 16px;
  height: 16px;
}

/* ========================================
   App Info
   ======================================== */
.app-info {
  text-align: center;
  padding: 32px 16px 16px;
  font-size: var(--font-size-xs);
  color: var(--color-text-tertiary);
}

/* ========================================
   Responsive: Tablet (768px+)
   ======================================== */
@media (min-width: 768px) {
  .settings-header {
    padding: 0 24px;
  }

  .settings-page {
    padding: 0 24px 40px;
  }
}

/* ========================================
   Responsive: PC (1024px+)
   ======================================== */
@media (min-width: 1024px) {
  .settings-header {
    padding: 0 32px;
  }

  .settings-page {
    padding: 0 32px 40px;
  }

  .settings-card {
    box-shadow: var(--shadow-sm);
    border: none;
  }
}
</style>
</head>
